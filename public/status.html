<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Status - Conformidade DCG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#F8FAFC;color:#0F172A;padding:40px 20px;line-height:1.6}
.wrap{max-width:720px;margin:0 auto}
.header{text-align:center;margin-bottom:32px}
.header h1{font-size:32px;font-weight:800;letter-spacing:-.02em}
.header p{color:#64748B;margin-top:8px}
.status-hero{background:#10B981;color:#fff;padding:32px;border-radius:16px;text-align:center;margin-bottom:24px}
.status-hero.down{background:#DC2626}
.status-hero h2{font-size:24px;font-weight:800}
.status-hero p{opacity:.9;margin-top:8px}
.checks{background:#fff;border-radius:16px;padding:24px;border:1px solid #E2E8F0}
.check{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #F1F5F9}
.check:last-child{border-bottom:none}
.check .name{font-weight:600}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:8px}
.dot.ok{background:#10B981}
.dot.fail{background:#DC2626}
.badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px}
.badge.ok{background:#D1FAE5;color:#065F46}
.badge.fail{background:#FEE2E2;color:#991B1B}
.updated{text-align:center;margin-top:24px;color:#94A3B8;font-size:13px}
a{color:#1565A8;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
<div class="header">
<h1>Status Conformidade DCG</h1>
<p>Transparencia e confianca operacional em tempo real</p>
</div>
<div id="hero" class="status-hero"><h2 id="h-title">Verificando...</h2><p id="h-sub">Aguarde</p></div>
<div class="checks" id="checks"></div>
<p class="updated" id="updated">—</p>
<p style="text-align:center;margin-top:24px"><a href="/">← Voltar ao site</a></p>
</div>
<script>
const checks = [
  { name: "API Principal", url: "/api/health" },
  { name: "Site Publico", url: "/" },
  { name: "Area do Cliente", url: "/app.html" },
  { name: "Parceiros", url: "/contadores.html" }
];
async function test(){
  const results = await Promise.all(checks.map(async c => {
    try { const r = await fetch(c.url, {method:'HEAD'}); return {...c, ok: r.ok}; }
    catch { return {...c, ok: false}; }
  }));
  const allOk = results.every(r => r.ok);
  const hero = document.getElementById('hero');
  hero.className = 'status-hero' + (allOk ? '' : ' down');
  document.getElementById('h-title').textContent = allOk ? '✓ Todos os servicos operacionais' : '⚠ Alguns servicos com problema';
  document.getElementById('h-sub').textContent = allOk ? 'Sistema 100% disponivel' : 'Investigando';
  document.getElementById('checks').innerHTML = results.map(r => 
    '<div class="check"><span class="name"><span class="dot '+(r.ok?'ok':'fail')+'"></span>'+r.name+'</span><span class="badge '+(r.ok?'ok':'fail')+'">'+(r.ok?'Operacional':'Indisponivel')+'</span></div>'
  ).join('');
  document.getElementById('updated').textContent = 'Ultima verificacao: ' + new Date().toLocaleString('pt-BR');
}
test();
setInterval(test, 30000);
</script>
</body></html>
